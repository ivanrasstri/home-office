name: Job Search Bot

# Запуск по расписанию + вручную (кнопка Run workflow во вкладке Actions).
on:
  schedule:
    # Каждый будний день в 06:00 UTC (~11:00 по Ташкенту). cron в UTC.
    - cron: "0 6 * * 1-5"
  workflow_dispatch: {}

# Нужны права на запись, чтобы коммитить отчёты/отклики/seen.json обратно.
permissions:
  contents: write

concurrency:
  group: job-search
  cancel-in-progress: false

jobs:
  search:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run job search bot
        env:
          # Добавь секрет в Settings → Secrets and variables → Actions.
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          JOBBOT_MODEL: ${{ vars.JOBBOT_MODEL || 'claude-opus-4-8' }}
          JOBBOT_TOP_N: ${{ vars.JOBBOT_TOP_N || '5' }}
          JOBBOT_MIN_SCORE: ${{ vars.JOBBOT_MIN_SCORE || '25' }}
        run: python -m jobbot

      - name: Commit results
        run: |
          git config user.name "job-search-bot"
          git config user.email "actions@github.com"
          git add data/ reports/ applications/
          if git diff --cached --quiet; then
            echo "Изменений нет — коммит не требуется."
          else
            git commit -m "chore: job search results $(date -u +%Y-%m-%d)"
            git push
          fi

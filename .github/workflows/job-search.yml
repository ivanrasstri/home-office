name: Job Search Bot

# Фаза 1: подборка вакансий по расписанию. Без генерации откликов (без Claude).
on:
  schedule:
    # Каждый будний день в 06:00 UTC (~11:00 по Ташкенту). cron в UTC.
    - cron: "0 6 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: job-search
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Collect jobs (no AI)
        env:
          JOBBOT_MIN_SCORE: ${{ vars.JOBBOT_MIN_SCORE || '25' }}
        run: python -m jobbot collect

      - name: Commit results
        run: |
          git config user.name "job-search-bot"
          git config user.email "actions@github.com"
          git add data/ reports/
          if git diff --cached --quiet; then
            echo "Изменений нет — коммит не требуется."
          else
            git commit -m "chore: job shortlist $(date -u +%Y-%m-%d)"
            git push
          fi

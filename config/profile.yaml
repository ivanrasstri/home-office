# Профиль соискателя. По нему бот ищет, фильтрует и оценивает вакансии,
# а также готовит сопроводительные письма и адаптирует резюме.
# Меняй под себя — это единственный файл, который нужно держать актуальным.

name: "Иван Расстриженков"
# Краткое описание желаемой роли (идёт в промпт Claude при генерации откликов).
headline: >
  Senior Producer / Creative Lead / Project Manager с 6+ годами опыта в
  креативном и маркетинговом продакшене. Руководство командами до 20+ человек,
  полный цикл 360° кампаний (идея → продакшн → анализ), выстраивание процессов
  между подразделениями, бюджетирование и метрики (сроки, CSI, CSAT, ROAS),
  активное использование ИИ-инструментов в продакшене.

# Поисковые запросы по источникам, где есть текстовый поиск (hh, linkedin, indeed).
# Бот прогонит каждый запрос отдельно и объединит результаты.
queries:
  - "продюсер креативной студии"
  - "креативный продюсер"
  - "senior producer"
  - "creative lead"
  - "head of production"
  - "продакшн менеджер"
  - "проектный менеджер маркетинг"
  - "project manager"
  - "operations manager"
  - "operational manager"
  - "creative producer"
  - "creative project manager"
  - "продюсер контента"

# Ключевые слова для скоринга. Совпадение в названии вакансии весит больше,
# чем в описании. Можно указывать части слов (без учёта регистра).
keywords:
  strong: # сильные сигналы — то, что прямо про твою роль
    - "продюсер"
    - "producer"
    - "креатив"
    - "creative"
    - "продакшн"
    - "production"
    - "проектный менеджер"
    - "project manager"
    - "проджект"
    - "operations manager"
    - "operational manager"
    - "операционный менеджер"
    - "creative lead"
    - "head of production"
    - "продакшн-менеджер"
  nice: # дополнительные плюсы
    - "маркетинг"
    - "marketing"
    - "кампани"      # кампания/campaign
    - "campaign"
    - "бренд"
    - "brand"
    - "контент"
    - "content"
    - "дизайн"
    - "design"
    - "моушн"
    - "motion"
    - "jira"
    - "confluence"
    - "notion"
    - "figma"
    - "360"
    - "atl"
    - "btl"
    - "бюджет"
    - "budget"
    - "ии"            # ИИ
    - "ai"
    - "нейросет"     # нейросеть/нейросети
    - "midjourney"
    - "chatgpt"
    - "gpt"

# Стоп-слова: если попадается в названии — вакансия отбраковывается
# (например, "продюсер" в кино/музыке или совсем не та сфера).
exclude:
  - "официант"
  - "повар"
  - "водитель"
  - "продавец"

# Локация и формат.
location:
  city: "Ташкент"
  country: "Узбекистан"
  remote_ok: true       # рассматриваешь удалёнку
  relocate_ok: false    # готов ли к релокации (влияет на международные борды)

# Параметры для hh (HeadHunter). area: 97 = Узбекистан. Полный справочник:
# https://api.hh.ru/areas  (Ташкент = 2759). Оставь пустым, чтобы искать везде.
headhunter:
  area: 97
  per_page: 50
